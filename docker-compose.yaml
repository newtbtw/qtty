services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qtty_db
      POSTGRES_USER: qtty_app
      POSTGRES_PASSWORD: qtty_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
